# Paper Trading Agent Configuration
# Load with STA_AGENTS_CONFIG=agents.paper.yaml

agents:
  - name: rsi_scanner
    strategy: rsi
    schedule: cron
    cron: "*/5 * * * *"
    action_level: auto_execute
    trust_level: assisted
    broker: alpaca
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      oversold: 30
      overbought: 70
      period: 14

  - name: volume_spike
    strategy: volume_spike
    schedule: cron
    cron: "*/5 * * * *"
    action_level: auto_execute
    trust_level: assisted
    broker: alpaca
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
    parameters:
      volume_threshold: 2.0

  - name: kalshi_news_arb
    strategy: kalshi_news_arb
    schedule: cron
    cron: "*/15 * * * *"
    action_level: auto_execute
    trust_level: autonomous
    parameters:
      categories: ["economics", "climate"]
      # Loosened from 8¢/45-conf → 5¢/30-conf on 2026-04-16 after 24h
      # of zero-output scans with 15 headlines per tick. Paper-mode is
      # learning-friendly: we want observed fills to tune the filter
      # off, not pre-emptive tight filters that see nothing. Ratchet
      # back up when signal quality is validated post-compliance.
      threshold_cents: 5
      min_confidence: 30
      max_markets_per_scan: 20
      rss_feeds:
        - http://feeds.bbci.co.uk/news/world/rss.xml
        - http://feeds.bbci.co.uk/news/politics/rss.xml
        - http://feeds.bbci.co.uk/news/business/rss.xml
        - https://feeds.npr.org/1001/rss.xml
        - https://feeds.npr.org/1014/rss.xml
        - https://www.aljazeera.com/xml/rss/all.xml

  - name: polymarket_news_arb
    strategy: polymarket_news_arb
    schedule: cron
    cron: "*/15 * * * *"
    action_level: auto_execute
    trust_level: autonomous
    parameters:
      tags: ["politics", "crypto"]
      # Same loosening as kalshi_news_arb — see note there.
      threshold_cents: 5
      min_confidence: 30
      max_markets_per_scan: 20
      rss_feeds:
        - http://feeds.bbci.co.uk/news/world/rss.xml
        - http://feeds.bbci.co.uk/news/politics/rss.xml
        - http://feeds.bbci.co.uk/news/business/rss.xml
        - https://feeds.npr.org/1001/rss.xml
        - https://feeds.npr.org/1014/rss.xml
        - https://www.aljazeera.com/xml/rss/all.xml

  - name: exit_monitor
    strategy: exit_monitor
    schedule: cron
    cron: "* * * * *"
    action_level: auto_execute
    trust_level: autonomous

  - name: bittensor_btc_5m
    strategy: bittensor_signal
    schedule: continuous
    interval: 60
    action_level: notify
    trust_level: monitored
    parameters:
      symbol: BTCUSD
      timeframe: 5m
      max_signal_age_seconds: 600
      min_responses_for_opportunity: 3
      min_agreement_ratio: 0.65
      min_abs_direction: 0.20
      min_expected_return: 0.002
      max_weighting_divergence: 0.25
      use_weighted_view: false
      allow_short_signals: true

  - name: bittensor_eth_5m
    strategy: bittensor_signal
    schedule: continuous
    interval: 60
    action_level: notify
    trust_level: monitored
    parameters:
      symbol: ETHUSD
      timeframe: 5m
      max_signal_age_seconds: 600
      min_responses_for_opportunity: 3
      min_agreement_ratio: 0.65
      min_abs_direction: 0.20
      min_expected_return: 0.002
      max_weighting_divergence: 0.25
      use_weighted_view: false
      allow_short_signals: true

  - name: momentum_scanner
    strategy: momentum
    schedule: cron
    cron: "*/5 * * * *"
    action_level: notify
    trust_level: monitored
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      lookback_days: 20
      volume_threshold: 1.5
      cooldown_hours: 24

  - name: mean_reversion
    strategy: mean_reversion
    schedule: cron
    cron: "*/5 * * * *"
    action_level: notify
    trust_level: monitored
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      bb_period: 20
      bb_std: 2.0
      rsi_threshold: 35
      rsi_period: 14

  - name: breakout_scanner
    strategy: breakout
    schedule: cron
    cron: "*/5 * * * *"
    action_level: notify
    trust_level: monitored
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      lookback_days: 50
      volume_threshold: 2.0

  - name: multi_factor
    strategy: multi_factor
    schedule: cron
    cron: "*/5 * * * *"
    action_level: notify
    trust_level: monitored
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      composite_threshold: 0.6
      rsi_weight: 0.4
      macd_weight: 0.3
      volume_weight: 0.3

  # -------------------------------------------------------------------------
  # Investor-persona LLM agents (paper-only per ADR-0010).
  #
  # Six divergent value-investor lenses, each layered on top of llm_analyst's
  # base market-summary prompt via system_prompt.  Opt in to the intel_sentiment
  # SignalBus topic (ADR-0011) via parameters.consume_sentiment.  Schedules are
  # widely-spaced (4h-24h) because these are long-horizon analyses, not tick
  # responders, and the LLM bill matters.
  #
  # Promotion to live (agents.yaml) is gated by ADR-0010.
  # -------------------------------------------------------------------------

  - name: buffett_value
    strategy: llm
    schedule: cron
    cron: "30 13 * * 1-5"   # 13:30 UTC = ~08:30 ET (Tue-Sat post-close cycle ok with cron weekdays)
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["AAPL", "MSFT", "GOOGL", "BRK.B", "KO", "AXP", "MCO", "OXY", "CVX"]
    system_prompt: |
      You are Warren Buffett. Apply long-horizon value investing.
      Look for businesses with durable competitive moats, owner-earnings
      power, and predictable free-cash-flow generation. Prefer ROIC above
      the cost of capital sustained over a decade. Avoid: high leverage,
      capital-intensive commodity producers without scale advantage, and
      anything you do not understand. A great business at a fair price
      beats a fair business at a great price. Only flag opportunities when
      a 5-10 year holding period looks attractive at the current quote.
      Be patient. Confidence below 0.7 means "wait."
    parameters:
      consume_sentiment: true
      sentiment_max_age_seconds: 900

  - name: graham_deep_value
    strategy: llm
    schedule: cron
    cron: "0 14 * * 1-5"   # 14:00 UTC daily weekdays
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["F", "GM", "HPQ", "DELL", "WBA", "PFE", "BMY", "VZ", "T", "INTC"]
    system_prompt: |
      You are Benjamin Graham. Apply the deep-value/margin-of-safety
      discipline. Calculate net-net working capital (NCAV) where possible.
      Prefer P/B below 1.0, P/E below 15, dividends paid for 10+ years,
      and current ratio above 2.0. Treat short-term price action as noise;
      Mr. Market is irrational and your job is to wait for his price to
      dislocate from intrinsic value. Reject growth stories without
      tangible asset backing. Confidence reflects margin of safety —
      below 0.6 means insufficient.
    parameters:
      consume_sentiment: false   # Graham distrusts sentiment

  - name: lynch_growth
    strategy: llm
    schedule: cron
    cron: "0 15 * * 1-5"   # 15:00 UTC daily weekdays
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["NVDA", "META", "TSLA", "AMD", "CRWD", "PLTR", "SHOP", "AVGO", "ANET", "CRM"]
    system_prompt: |
      You are Peter Lynch. Look for "ten-baggers" — category leaders
      growing earnings at 15-25% annually with PEG below 1.0, that you
      can describe in two sentences. Favor stalwarts and fast-growers in
      industries you understand. Avoid: turnarounds without insider
      buying, diworsification stories, hot tips. The story matters: what
      is this company doing that the market underestimates? Recent
      revenue acceleration with stable margins is the strongest signal.
      Confidence below 0.65 means the story is unclear.
    parameters:
      consume_sentiment: true
      sentiment_max_age_seconds: 600

  - name: munger_quality
    strategy: llm
    schedule: cron
    cron: "0 16 * * 1-5"   # 16:00 UTC daily weekdays
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["BRK.B", "COST", "V", "MA", "ASML", "TSM", "ADBE", "GOOGL", "MSFT", "MCO"]
    system_prompt: |
      You are Charlie Munger. Invert: what would make this investment
      fail? Apply mental models from multiple disciplines — psychology
      (incentive bias), microeconomics (durable moats), and accounting
      (cash conversion). Demand a high-quality business: returns on
      tangible capital above 20% sustained, capital allocators with
      skin in the game, and a customer-side moat (network, switching
      cost, brand pricing power). Reject mediocre businesses at any
      price. Patience is a competitive advantage; cash optionality is
      undervalued. Confidence below 0.7 means the quality bar isn't
      cleared.
    parameters:
      consume_sentiment: false   # Munger: "sentiment is the opposite of thinking"

  - name: klarman_distressed
    strategy: llm
    schedule: cron
    cron: "0 17 * * 1-5"   # 17:00 UTC daily weekdays
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["WBA", "PARA", "DIS", "BAC", "C", "MS", "GS", "VTRS", "KHC", "TFC"]
    system_prompt: |
      You are Seth Klarman. Look for absolute returns through margin of
      safety in stressed or complex situations: post-bankruptcy equities,
      spin-offs, secondary offerings under duress, and special situations
      with quantifiable downside. Decline correlation; prefer cash to
      forced action. Position-sizing is the most important risk control —
      no single thesis should sink you. Reject narratives without a clear
      catalyst path. Confidence reflects asymmetry — flag only when
      downside is contained and upside is multiples.
    parameters:
      consume_sentiment: true
      sentiment_max_age_seconds: 900

  - name: marks_macro
    strategy: llm
    schedule: cron
    cron: "0 18 * * 1-5"   # 18:00 UTC daily weekdays
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["SPY", "QQQ", "IWM", "TLT", "GLD", "HYG", "EEM", "VIX", "DXY", "BTCUSD", "ETHUSD"]
    system_prompt: |
      You are Howard Marks. Think in second-level terms: it is not enough
      that something is good; you must understand what the market expects.
      Where is the consensus, and where is it wrong? Risk is what's
      left when you've thought of everything you can think of. Focus
      on the pendulum: greed-fear, expansion-contraction, lender-aggression
      vs caution. Defensive in expensive markets; aggressive in stressed
      ones. Flag macro misalignments where the price embeds the wrong
      regime expectation. Confidence reflects how far you stand from
      consensus, not how strongly you feel.
    parameters:
      consume_sentiment: true
      sentiment_max_age_seconds: 300

  # Cross-platform arb agent — needed in paper mode to drive the arb signal
  # feed pipeline locally. Mirrors the agents.yaml entry; same threshold and
  # quality gates. See docs/feeds/arb/phase-b-findings.md and
  # docs/superpowers/specs/2026-04-15-arb-signal-feed-design.md.
  - name: cross_platform_arb
    strategy: cross_platform_arb
    schedule: cron
    cron: "*/30 * * * *"
    action_level: suggest_trade
    parameters:
      threshold_cents: 8
      min_match_similarity: 0.60
      max_gap_cents: 50
      alert_on_spread: true
      kalshi_categories: ["economics", "politics", "climate"]
      polymarket_tags: ["politics", "crypto", "climate"]
      max_markets_per_platform: 50
