# Paper Trading Agent Configuration
# Load with STA_AGENTS_CONFIG=agents.paper.yaml

agents:
  - name: rsi_scanner
    strategy: rsi
    schedule: cron
    cron: "*/5 * * * *"
    action_level: auto_execute
    trust_level: assisted
    broker: alpaca
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      oversold: 30
      overbought: 70
      period: 14

  - name: volume_spike
    strategy: volume_spike
    schedule: cron
    cron: "*/5 * * * *"
    action_level: auto_execute
    trust_level: assisted
    broker: alpaca
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
    parameters:
      volume_threshold: 2.0

  - name: kalshi_news_arb
    strategy: kalshi_news_arb
    schedule: cron
    cron: "*/15 * * * *"
    action_level: auto_execute
    trust_level: autonomous
    parameters:
      categories: ["economics", "climate"]
      # Loosened from 8¢/45-conf → 5¢/30-conf on 2026-04-16 after 24h
      # of zero-output scans with 15 headlines per tick. Paper-mode is
      # learning-friendly: we want observed fills to tune the filter
      # off, not pre-emptive tight filters that see nothing. Ratchet
      # back up when signal quality is validated post-compliance.
      threshold_cents: 5
      min_confidence: 30
      max_markets_per_scan: 20
      rss_feeds:
        - http://feeds.bbci.co.uk/news/world/rss.xml
        - http://feeds.bbci.co.uk/news/politics/rss.xml
        - http://feeds.bbci.co.uk/news/business/rss.xml
        - https://feeds.npr.org/1001/rss.xml
        - https://feeds.npr.org/1014/rss.xml
        - https://www.aljazeera.com/xml/rss/all.xml

  - name: polymarket_news_arb
    strategy: polymarket_news_arb
    schedule: cron
    cron: "*/15 * * * *"
    action_level: auto_execute
    trust_level: autonomous
    parameters:
      tags: ["politics", "crypto"]
      # Same loosening as kalshi_news_arb — see note there.
      threshold_cents: 5
      min_confidence: 30
      max_markets_per_scan: 20
      rss_feeds:
        - http://feeds.bbci.co.uk/news/world/rss.xml
        - http://feeds.bbci.co.uk/news/politics/rss.xml
        - http://feeds.bbci.co.uk/news/business/rss.xml
        - https://feeds.npr.org/1001/rss.xml
        - https://feeds.npr.org/1014/rss.xml
        - https://www.aljazeera.com/xml/rss/all.xml

  - name: exit_monitor
    strategy: exit_monitor
    schedule: cron
    cron: "* * * * *"
    action_level: auto_execute
    trust_level: autonomous

  - name: bittensor_btc_5m
    strategy: bittensor_signal
    schedule: continuous
    interval: 60
    action_level: notify
    trust_level: monitored
    parameters:
      symbol: BTCUSD
      timeframe: 5m
      max_signal_age_seconds: 600
      min_responses_for_opportunity: 3
      min_agreement_ratio: 0.65
      min_abs_direction: 0.20
      min_expected_return: 0.002
      max_weighting_divergence: 0.25
      use_weighted_view: false
      allow_short_signals: true

  - name: bittensor_eth_5m
    strategy: bittensor_signal
    schedule: continuous
    interval: 60
    action_level: notify
    trust_level: monitored
    parameters:
      symbol: ETHUSD
      timeframe: 5m
      max_signal_age_seconds: 600
      min_responses_for_opportunity: 3
      min_agreement_ratio: 0.65
      min_abs_direction: 0.20
      min_expected_return: 0.002
      max_weighting_divergence: 0.25
      use_weighted_view: false
      allow_short_signals: true

  - name: momentum_scanner
    strategy: momentum
    schedule: cron
    cron: "*/5 * * * *"
    action_level: notify
    trust_level: monitored
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      lookback_days: 20
      volume_threshold: 1.5
      cooldown_hours: 24

  - name: mean_reversion
    strategy: mean_reversion
    schedule: cron
    cron: "*/5 * * * *"
    action_level: notify
    trust_level: monitored
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      bb_period: 20
      bb_std: 2.0
      rsi_threshold: 35
      rsi_period: 14

  - name: breakout_scanner
    strategy: breakout
    schedule: cron
    cron: "*/5 * * * *"
    action_level: notify
    trust_level: monitored
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      lookback_days: 50
      volume_threshold: 2.0

  - name: multi_factor
    strategy: multi_factor
    schedule: cron
    cron: "*/5 * * * *"
    action_level: notify
    trust_level: monitored
    universe: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "NVDA", "META"]
    parameters:
      composite_threshold: 0.6
      rsi_weight: 0.4
      macd_weight: 0.3
      volume_weight: 0.3

  # -------------------------------------------------------------------------
  # Investor-persona LLM agents (paper-only per ADR-0010).
  #
  # Six divergent value-investor lenses.  System prompts live in
  # trading/strategies/prompts/personas.py and are referenced via the
  # "module:" sentinel (resolved by agents/config._resolve_prompt_reference).
  # Opt in to the intel_sentiment topic (ADR-0011) via consume_sentiment.
  # Schedules are widely-spaced — these are long-horizon analyses, not tick
  # responders, and the LLM bill matters.
  #
  # Promotion to live (agents.yaml) is gated by ADR-0010.
  # -------------------------------------------------------------------------

  - name: buffett_value
    strategy: llm
    schedule: cron
    cron: "30 13 * * 1-5"   # 13:30 UTC = ~08:30 ET
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["AAPL", "MSFT", "GOOGL", "BRK.B", "KO", "AXP", "MCO", "OXY", "CVX"]
    system_prompt: "module:strategies.prompts.personas:BUFFETT_VALUE"
    parameters:
      consume_sentiment: true
      sentiment_max_age_seconds: 900

  - name: graham_deep_value
    strategy: llm
    schedule: cron
    cron: "0 14 * * 1-5"
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["F", "GM", "HPQ", "DELL", "WBA", "PFE", "BMY", "VZ", "T", "INTC"]
    system_prompt: "module:strategies.prompts.personas:GRAHAM_DEEP_VALUE"
    parameters:
      consume_sentiment: false   # Graham distrusts sentiment

  - name: lynch_growth
    strategy: llm
    schedule: cron
    cron: "0 15 * * 1-5"
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["NVDA", "META", "TSLA", "AMD", "CRWD", "PLTR", "SHOP", "AVGO", "ANET", "CRM"]
    system_prompt: "module:strategies.prompts.personas:LYNCH_GROWTH"
    parameters:
      consume_sentiment: true
      sentiment_max_age_seconds: 600

  - name: munger_quality
    strategy: llm
    schedule: cron
    cron: "0 16 * * 1-5"
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["BRK.B", "COST", "V", "MA", "ASML", "TSM", "ADBE", "GOOGL", "MSFT", "MCO"]
    system_prompt: "module:strategies.prompts.personas:MUNGER_QUALITY"
    parameters:
      consume_sentiment: false   # Munger: "sentiment is the opposite of thinking"

  - name: klarman_distressed
    strategy: llm
    schedule: cron
    cron: "0 17 * * 1-5"
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["WBA", "PARA", "DIS", "BAC", "C", "MS", "GS", "VTRS", "KHC", "TFC"]
    system_prompt: "module:strategies.prompts.personas:KLARMAN_DISTRESSED"
    parameters:
      consume_sentiment: true
      sentiment_max_age_seconds: 900

  - name: marks_macro
    strategy: llm
    schedule: cron
    cron: "0 18 * * 1-5"
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["SPY", "QQQ", "IWM", "TLT", "GLD", "HYG", "EEM", "VIX", "DXY", "BTCUSD", "ETHUSD"]
    system_prompt: "module:strategies.prompts.personas:MARKS_MACRO"
    parameters:
      consume_sentiment: true
      sentiment_max_age_seconds: 300

  # -------------------------------------------------------------------------
  # Persona panels — N personas in parallel, judge synthesizes one verdict.
  #
  # Two flavors today:
  #  - persona_panel_equities: all 6 personas on US mega-caps (heavy: 6 LLM
  #    calls + 1 judge per symbol, so capped tight)
  #  - persona_panel_crypto: macro + growth + contrarian only on BTC/ETH
  #
  # Once we have 30 days of paper data we can tune the conviction_weight and
  # decide which subsets diverge most usefully — see ADR-0011 follow-ups.
  # -------------------------------------------------------------------------

  - name: persona_panel_equities
    strategy: persona_panel
    schedule: cron
    cron: "0 14 * * 1-5"   # 14:00 UTC weekdays, after the morning personas warm up
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["AAPL", "MSFT", "GOOGL", "META", "NVDA"]
    # Worst case: 6 personas + 1 judge per symbol × 2 symbols = 14 LLM calls.
    # AgentConfig.max_calls_per_scan defaults to 5 — too low for the panel
    # pattern.  20 gives headroom for retries without uncapping spend.
    max_calls_per_scan: 20
    parameters:
      personas:
        - buffett_value
        - graham_deep_value
        - lynch_growth
        - munger_quality
        - klarman_distressed
        - marks_macro
      max_symbols_per_scan: 2
      min_confidence: 0.55
      conviction_weight: 0.6

  - name: persona_panel_crypto
    strategy: persona_panel
    schedule: continuous
    interval: 3600              # Every hour for crypto's 24/7 schedule
    action_level: notify
    trust_level: monitored
    model: claude-sonnet-4-6
    universe: ["BTCUSD", "ETHUSD"]
    # Worst case: 3 personas + 1 judge × 2 symbols = 8 LLM calls.  12 gives
    # headroom (see equities note above).
    max_calls_per_scan: 12
    parameters:
      personas:
        - marks_macro             # Macro/cycles lens
        - lynch_growth            # Growth-with-story lens
        - klarman_distressed      # Asymmetry + drawdown discipline lens
      max_symbols_per_scan: 2
      min_confidence: 0.55
      conviction_weight: 0.65

  # Cross-platform arb agent — needed in paper mode to drive the arb signal
  # feed pipeline locally. Mirrors the agents.yaml entry; same threshold and
  # quality gates. See docs/feeds/arb/phase-b-findings.md and
  # docs/superpowers/specs/2026-04-15-arb-signal-feed-design.md.
  - name: cross_platform_arb
    strategy: cross_platform_arb
    schedule: cron
    cron: "*/30 * * * *"
    action_level: suggest_trade
    parameters:
      threshold_cents: 8
      min_match_similarity: 0.60
      max_gap_cents: 50
      alert_on_spread: true
      kalshi_categories: ["economics", "politics", "climate"]
      polymarket_tags: ["politics", "crypto", "climate"]
      max_markets_per_platform: 50
