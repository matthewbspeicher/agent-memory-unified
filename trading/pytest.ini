[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
norecursedirs = vendor .git __pycache__ scripts
addopts = -m "not live_paper and not integration"

filterwarnings =
    # Vendor deprecations we cannot fix without upgrading pinned deps:
    # - uvicorn 0.44 imports websockets.legacy (deprecated in websockets 14+).
    #   Requires newer uvicorn that has migrated to the asyncio client.
    ignore:websockets\.legacy is deprecated:DeprecationWarning
    # - slowapi 0.1.9 uses asyncio.iscoroutinefunction internally (slated for
    #   removal in Python 3.16). Fixed upstream in newer slowapi versions.
    ignore:.*asyncio\.iscoroutinefunction.*is deprecated:DeprecationWarning:slowapi\..*
    ignore::RuntimeWarning:unittest.mock
    ignore:.*paper mode without STA_API_KEY:UserWarning
    ignore:coroutine.*AsyncMockMixin.*was never awaited:RuntimeWarning

markers =
    live_paper: marks tests that require real API credentials and network access
    integration: marks tests that require a running IB Gateway
    timeout: marks tests to fail after a duration
