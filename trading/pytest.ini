[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
norecursedirs = vendor .git __pycache__ scripts
addopts = -m "not live_paper and not integration"

filterwarnings =
    ignore:websockets\.legacy is deprecated:DeprecationWarning
markers =
    live_paper: marks tests that require real API credentials and network access
    integration: marks tests that require a running IB Gateway
    timeout: marks tests to fail after a duration
