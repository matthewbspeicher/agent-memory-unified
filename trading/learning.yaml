pnl:
  mark_to_market_seconds: 60
  reconciliation_seconds: 300

retention:
  default_days: 90

optimization:
  grid_search_schedule: "0 2 * * 0"
  tournament_challengers: 4
  tournament_promotion_margin: 0.10
  min_backtest_trades: 30
  min_paper_days: 7

reflection:
  feedback_model: "claude-sonnet-4-20250514"
  synthesis_model: "claude-sonnet-4-20250514"
  synthesis_interval_days: 7
  max_learned_rules: 10
  recent_lessons_window: 5
  auto_revert_sharpe_drop: 0.20

guardrails:
  max_daily_parameter_changes: 1
  max_parameter_change_pct: 0.20
  cooldown_after_disable_hours: 48

tournament:
  enabled: true
  evaluate_cron: "0 * * * *"
  stages:
    1:
      min_sharpe: 1.5
      min_trades: 50
      max_drawdown: 0.15
      min_win_rate: 0.45
    2:
      min_sharpe: 1.8
      min_trades: 100
      max_drawdown: 0.12
      min_win_rate: 0.48
    3:
      min_sharpe: 2.0
      min_trades: 200
      max_drawdown: 0.10
      min_win_rate: 0.50
  live_limited:
    max_capital_pct: 0.10
    max_capital_usd: 500

memory:
  enabled: true
  deep_reflection:
    pnl_multiplier: 2.0
    loss_multiplier: 1.5
  ttl_days: 90
  pre_trade_query:
    enabled: true
    top_k: 5

confidence_calibration:
  enabled: true
  bucket_width: 0.10
  min_trades_for_usable_bucket: 25
  min_trades_for_hard_reject: 50
  insufficient_sample_multiplier: 0.75
  max_positive_multiplier: 1.25
  max_composed_kelly_fraction: 0.50
  weak_expectancy_threshold: 0.005
  moderate_expectancy_threshold: 0.015
  strong_expectancy_threshold: 0.03
  allow_reject: false

strategy_health:
  enabled: true
  default_window_trades: 50
  default_expectancy_floor: 0
  default_drawdown_limit: 5000
  default_min_trade_count: 20
  cooldown_hours: 24
  recovery_window_trades: 30
  throttle_multiplier: 0.5
  retire_after_breaches: 3
