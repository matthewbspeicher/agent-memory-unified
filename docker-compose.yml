version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  trading:
    build:
      context: .
      dockerfile: Dockerfile.trading
    command: ["python3", "scripts/run_dev.py"]
    ports:
      - "8080:8080"
    env_file:
      - ./trading/.env
    environment:
      STA_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-secret}@postgres:5432/agent_memory
      STA_DATABASE_SSL: "false"
      STA_REDIS_URL: redis://redis:6379
      STA_ARB_AUTO_EXECUTE: "false"
      STA_ARB_MIN_PROFIT_BPS: "5.0"
      STA_ARB_MAX_POSITION_USD: "100.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./trading:/app/trading
      - ./shared:/app/shared
      - ./taoshi-vanta:/app/taoshi-vanta:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      VITE_TRADING_API_URL: http://localhost:8080
    # Port mapping removed - run natively via Vite due to Docker port forwarding issues

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  monitoring:
    driver: bridge