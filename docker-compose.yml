version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/var/www/html

  trading:
    build:
      context: .
      dockerfile: Dockerfile.trading
    command: ["python3", "-c", "import logging; logging.basicConfig(level=logging.INFO); logging.getLogger('integrations.bittensor').setLevel(logging.DEBUG); logging.getLogger('btdecode').setLevel(logging.WARNING); logging.getLogger('websockets').setLevel(logging.WARNING); from main import app; import uvicorn; uvicorn.run(app, host='0.0.0.0', port=8080, log_level='info')"]
    ports:
      - "8080:8080"
    env_file:
      - ./trading/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./trading:/app/trading
      - ./shared:/app/shared
      - ./taoshi-ptn:/app/taoshi-ptn:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      VITE_TRADING_API_URL: http://localhost:8080

volumes:
  postgres_data:
  redis_data:
