services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-service:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: agent_memory
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PREFIX: ""
      STA_REDIS_PREFIX: ""
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  trading-service:
    build:
      context: .
      dockerfile: trading/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres/agent_memory
      REDIS_URL: redis://redis:6379
      STA_PRIMARY_BROKER: ""
      STA_IB_HOST: ""
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/app/frontend/dist:ro
    depends_on:
      - api-service
      - trading-service

volumes:
  postgres_data:
  redis_data:
