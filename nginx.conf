# Nginx Configuration for Agent Memory Unified
# This config handles routing for both the React SPA and the Laravel/Python APIs.

server {
    listen 80;
    server_name _;
    root /app/frontend/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Frontend SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Laravel API (API Service)
    location /api {
        proxy_pass http://api-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Python Trading API (Trading Service)
    # Most trading requests actually go through Laravel as proxy, 
    # but some internal dashboard calls might go direct.
    location /api/trading-direct {
        rewrite ^/api/trading-direct/(.*) /$1 break;
        proxy_pass http://trading-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
}
