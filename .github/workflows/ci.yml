name: CI

on: [push, pull_request]

jobs:
  check-types:
    name: Shared Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install datamodel-code-generator

      - name: Generate types
        run: ./scripts/sync-types.sh

      - name: Check for uncommitted changes
        run: |
          if [[ -n $(git status --porcelain shared/types/generated/) ]]; then
            echo "Generated types not committed!"
            git status shared/types/generated/
            exit 1
          fi

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  api-lint:
    name: API Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, bcmath, zip
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Laravel config check
        run: php artisan config:clear

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress
        continue-on-error: true  # Allow initial run to identify baseline

  trading-lint:
    name: Trading Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .
